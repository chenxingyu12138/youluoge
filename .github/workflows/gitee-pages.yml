name: Sync to Gitee

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检查 Gitee 密钥
        env:
          HAS_USER: ${{ secrets.GITEE_USERNAME }}
          HAS_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$HAS_USER" ] || [ -z "$HAS_TOKEN" ]; then
            echo "::error::缺少 GITEE_USERNAME 或 GITEE_TOKEN"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步到 Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/youluoge.git"
          git push gitee main --force
